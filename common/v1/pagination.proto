syntax = "proto3";

package common.v1;

option go_package = "github.com/kitti12911/proto-sandbox/gen/grpc/common/v1;commonv1";

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int32 page = 1;
  int32 page_size = 2;
  int32 total_pages = 3;
  int32 total_size = 4;
}

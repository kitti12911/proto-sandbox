name: Proto CI

on:
    push:
        branches:
            - develop
            - uat
            - main
        paths:
            - ".releaserc.json"
            - ".github/workflows/proto-ci.yaml"
            - "buf.yaml"
            - "Makefile"
            - "**/*.proto"
            - "**/*.yml"
            - "**/*.yaml"
    pull_request:
        paths:
            - ".releaserc.json"
            - ".github/workflows/proto-ci.yaml"
            - "buf.yaml"
            - "Makefile"
            - "**/*.proto"
            - "**/*.yml"
            - "**/*.yaml"

permissions:
    contents: read
    pull-requests: write

jobs:
    proto:
        name: Buf
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Check breaking baseline
              id: breaking-baseline
              env:
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
              run: |
                  git fetch origin "${DEFAULT_BRANCH}" --depth=1

                  if git cat-file -e "FETCH_HEAD:buf.yaml" 2>/dev/null &&
                     git ls-tree -r --name-only FETCH_HEAD | grep -q '\.proto$'; then
                    echo "available=true" >> "${GITHUB_OUTPUT}"
                  else
                    echo "available=false" >> "${GITHUB_OUTPUT}"
                  fi

            # bufbuild/buf-action v1.4.0
            - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff
              with:
                  push: false
                  lint: true
                  format: true
                  breaking: ${{ steps.breaking-baseline.outputs.available }}

    version:
        name: Semantic Version
        runs-on: ubuntu-latest
        needs:
            - proto
        if: github.event_name == 'push'
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Install semantic-release
              run: |
                  npm install --no-save --no-package-lock \
                      semantic-release@24.2.7 \
                      @semantic-release/commit-analyzer@13.0.1 \
                      @semantic-release/release-notes-generator@14.0.3 \
                      @semantic-release/github@11.0.6 \
                      conventional-changelog-conventionalcommits@8.0.0

            - name: Publish semantic release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx semantic-release

syntax = "proto3";

package user.v1;

import "common/v1/pagination.proto";
import "common/v1/query.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/kitti12911/proto-sandbox/gen/grpc/user/v1;userv1";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {}
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {}
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc PatchUser(PatchUserRequest) returns (PatchUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {}
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  optional string display_name = 4;
  UserStatus status = 5;
  UserProfile profile = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message UserProfile {
  optional string first_name = 1;
  optional string last_name = 2;
  optional string phone_number = 3;
  optional UserAddress address = 4;
}

message UserAddress {
  optional string line1 = 1;
  optional string line2 = 2;
  optional string city = 3;
  optional string state = 4;
  optional string postal_code = 5;
  optional string country_code = 6;
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_DISABLED = 2;
  USER_STATUS_PENDING = 3;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  common.v1.PaginationRequest pagination = 1;
  repeated common.v1.Filter filters = 2;
  repeated common.v1.OrderBy order_by = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  common.v1.PaginationResponse pagination = 2;
}

message CreateUserRequest {
  User user = 1;
}

message CreateUserResponse {
  string id = 1;
}

message UpdateUserRequest {
  string id = 1;
  User user = 2;
}

message UpdateUserResponse {
  int64 affected_rows = 1;
}

message PatchUserRequest {
  string id = 1;
  User user = 2;
  google.protobuf.FieldMask update_mask = 3;
}

message PatchUserResponse {
  int64 affected_rows = 1;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  int64 affected_rows = 1;
}
